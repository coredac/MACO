name: MACO smoke test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "⚠️  No requirements.txt found, skipping dependency install."
        fi

    # Byte-compile catches syntax errors in every .py — including the
    # script-style entry points that can't safely be imported.
    - name: Byte-compile all Python sources
      run: python3 -m compileall -q agent algorithm run_maco.py run_maco_experiment.py run_single_agent_baseline.py

    # Import test catches rename / missing-symbol regressions in the
    # importable modules (agent + algorithm). The entry-point scripts
    # are intentionally not imported because they execute on import.
    - name: Import smoke test
      run: |
        python3 -c "
        import sys
        sys.path.insert(0, 'agent')
        sys.path.insert(0, 'algorithm')
        import cgra_codesigner, cgra_fixer, coarse_grained_judge, fine_grained_judge
        import exploration_exploitation, confidence_adaptive_selector
        print('✅ all agent + algorithm modules import cleanly')
        "
