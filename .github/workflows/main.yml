name: Run MACO

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-maco:
    runs-on: ubuntu-22.04   # 使用 Ubuntu 22.04 作为构建环境

    steps:
    # 1️⃣ 检出代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ 安装 Python3 和 pip（GitHub Ubuntu 镜像里自带，但保险起见可再装）
    - name: Setup base environment
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip git curl vim build-essential
        python3 -m pip install --upgrade pip

    # 3️⃣ 安装 Python 依赖
    - name: Install Python dependencies
      working-directory: ${{ github.workspace }}
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "⚠️  No requirements.txt found, skipping dependency install."
        fi

    # 4️⃣ 进入 algorithm 文件夹并运行 run_maco.py
    - name: Run run_maco.py
      working-directory: ${{ github.workspace }}/algorithm
      run: |
        echo "🚀 Running MACO..."
        python3 run_maco.py

    # （可选）5️⃣ 上传日志或结果
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: maco-logs
        path: ${{ github.workspace }}/algorithm/*.log
